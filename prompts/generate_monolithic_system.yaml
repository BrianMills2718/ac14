name: ac14_generate_monolithic_system
version: "1.0"
description: Generate a full AC14 component package in one whole-task pass.
messages:
  - role: system
    content: |
      You are generating an entire AC14 component package in one whole-task pass.

      Your job is to write one standalone Python module for every component in the
      supplied blueprint.

      Every emitted module must:
      - define a `GeneratedComponent` class
      - define `GeneratedComponent.execute(self, inputs)`
      - define a `build_component()` function returning `GeneratedComponent()`
      - accept AC14 port-keyed `inputs`
      - return plain dictionary payloads keyed by output port
      - fail loud rather than hiding mistakes

      Hard runtime-contract rules:
      - GeneratedComponent must be defined in EACH module file — do NOT inherit from an external base class
      - do not write `class GeneratedComponent(SomeBase):` unless SomeBase is also defined in the same module
      - all port values inside `inputs` are plain Python dicts — access them with `inputs['port_name']['field']` not `inputs['port_name'].field`
      - never use attribute access (dot notation) on values that came from `inputs` — they are dicts, not Pydantic models
      - if a schema field is optional, check it with `.get(...)` or `'field' in dict` before reading it; never index an optional field blindly
      - emit optional output fields only when the upstream optional condition is actually present
      - do not invent wrapper schema classes for runtime inputs or outputs
      - do not require `execute()` callers to pass custom objects instead of dictionaries
      - `build_component()` must return the component instance itself, not a dict or registry
      - keep owned state on `self` when the component owns a state store
      - define `GeneratedComponent` before `build_component()`, or avoid forward references that break import-time evaluation
      - keep Python syntax minimal and valid: no incomplete branches, no placeholder ellipses, and no missing parentheses
      - if a boolean condition spans multiple lines, wrap the whole expression in parentheses or keep it on one line; never break after `and` / `or` without explicit continuation
      - never leave an `if` / `elif` / `else` branch with comments only; every branch must contain real executable Python statements
      - for small deterministic transforms, prefer a short direct decision tree over exploratory prose comments or speculative fallback logic
      - if no schema-valid categorical value applies, raise `ValueError` loudly instead of inventing a fallback label outside the schema
      - keep comments short and rare; do not paste long reasoning or ambiguity analysis into generated modules
      - the safest pattern is: class first, then `def build_component(): return GeneratedComponent()`
      - do not annotate `build_component()` with `GeneratedComponent` unless the annotation is guaranteed to resolve safely at import time; the safest pattern is to omit the return annotation entirely

      Return only structured fields. Do not add markdown fences.

  - role: user
    content: |
      Generate the full AC14 component package for this benchmark in one pass.

      Benchmark:
      {{ benchmark }}

      Requirements document:
      {{ requirements_text }}

      Blueprint metadata:
      {{ blueprint_metadata }}

      Schemas:
      {{ schemas }}

      Components:
      {{ components }}

      Bindings:
      {{ bindings }}

      State stores:
      {{ state_stores }}

      Packet test cases by component:
      {{ packet_test_cases_by_component }}

      Repair guidance from the previous failed attempt:
      {{ repair_guidance }}

      Required output:
      - `modules` must contain exactly one module for every component in the blueprint
      - each `module_code` must be a complete Python module
      - `implementation_notes` should be short, concrete, and mention any benchmark-specific assumptions
