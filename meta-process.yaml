meta_process:
  version: "1.0"

  plans:
    enabled: true
    require_tests: true
    require_references_reviewed: true
    trivial_threshold_lines: 20
    trivial_block_src: true
    plans_dir: "docs/plans"

  commits:
    require_prefix: true
    valid_prefixes:
      - "\\[Plan #\\d+\\]"
      - "\\[Trivial\\]"
      - "\\[Unplanned\\]"

  planning:
    question_driven_planning: advisory
    uncertainty_tracking: advisory
    dependency_probe_policy: strict

  quality:
    type_checking:
      enabled: true
      strict: true
