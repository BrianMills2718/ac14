  - phase_id: phase_01_contract_and_verdict
    title: Comparison Contract And Verdict
    status: proven
    execution_mode: live
    input_artifact: frozen comparison plans + experiment_decision.json
    output_artifact: reviewable experiment summary
    acceptance_criteria:
    - The decision artifact exists and the verdict is explicit.
    - The experiment summary reflects the real persisted artifact.
  - phase_id: phase_02_trial_artifact_load
    title: Per-Trial Artifact Load
    status: proven
    execution_mode: live
    input_artifact: experiment decision artifact + paired trial reports
    output_artifact: compact per-trial summary rows
    acceptance_criteria:
    - Every paired trial report path resolves.
    - The notebook exposes pass/fail state for both conditions per trial.
  - phase_id: phase_03_failure_diagnosis
    title: Failure-Pattern Diagnosis
    status: proven
    execution_mode: live
    input_artifact: attempt reports
    output_artifact: bounded failure-pattern summary
    acceptance_criteria:
    - The notebook distinguishes shared and condition-specific failure patterns.
    - The diagnosis is derived from persisted attempt artifacts rather than static
      narration.
  - phase_id: phase_04_governance_lock
    title: Governance Lock
    status: proven
    execution_mode: live
    input_artifact: TODO + NEXT_24_HOURS + verdict artifact
    output_artifact: governance check for current and next plans
    acceptance_criteria:
    - The notebook proves the active docs point to the current post-verdict lanes.
    - The notebook does not leave the next empirical direction implicit.
