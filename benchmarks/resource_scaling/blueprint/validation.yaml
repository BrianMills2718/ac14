global_invariants:
- invariant_id: scaling_decision_entry_case_id_consistency
  description: ScalingDecisionEntry.case_id must equal the joined upstream case_id.
- invariant_id: scaling_decision_store_unique_case_ids
  description: ScalingDecisionStore.decisions must contain at most one entry per case_id.
evaluators:
- evaluator_id: exact_outputs
  kind: programmatic_exact
  description: Compare actual outputs to declared fixture outputs exactly.
scenarios:
- scenario_id: premium_immediate_scale_out
  kind: full_recomposition
  description: Premium critical breach scales out immediately without approval.
  evaluator_ids:
  - exact_outputs
  realistic_input: true
  fixture_ids:
  - premium_immediate_scale_out_metrics_normalizer
  - premium_immediate_scale_out_threshold_detector
  - premium_immediate_scale_out_urgency_classifier
  - premium_immediate_scale_out_trend_evaluator
  - premium_immediate_scale_out_deploy_risk_evaluator
  - premium_immediate_scale_out_service_policy_loader
  - premium_immediate_scale_out_recommendation_generator
  - premium_immediate_scale_out_approval_resolver
  - premium_immediate_scale_out_compliance_checker
  - premium_immediate_scale_out_scaling_plan_builder
  - premium_immediate_scale_out_alert_planner
  - premium_immediate_scale_out_execution_gate
  - premium_immediate_scale_out_decision_recorder
