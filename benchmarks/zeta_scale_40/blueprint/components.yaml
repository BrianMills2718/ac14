  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute color for Option A. output.
    name: option_a_color_output
    schema_id: OptionAColorOutput
  purpose: Compute color for Option A.
  semantic_responsibility: compute_option_a_color
- component_id: compute_option_a_dual_delta
  failure_semantics: []
  implementation_constraints:
  - dual_delta_call_a = -disc_alpha_a*N(d2_zeta_a)
  - dual_delta_put_a = disc_alpha_a*N(-d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute dual delta for Option A. output.
    name: option_a_dual_delta_output
    schema_id: OptionADualDeltaOutput
  purpose: Compute dual delta for Option A.
  semantic_responsibility: compute_option_a_dual_delta
- component_id: compute_option_a_ultima
  failure_semantics: []
  implementation_constraints:
  - ultima_a = -volga_a/vol_a*(d1_zeta_a*d2_zeta_a*(1-d1_zeta_a*d2_zeta_a) + d1_zeta_a**2
    + d2_zeta_a**2)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  - arrival_policy: required_latest
    description: volga_a
    name: option_a_volga_output
    required: true
