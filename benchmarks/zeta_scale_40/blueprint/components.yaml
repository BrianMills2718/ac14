  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute ultima for Option A. output.
    name: option_a_ultima_output
    schema_id: OptionAUltimaOutput
  purpose: Compute ultima for Option A.
  semantic_responsibility: compute_option_a_ultima
