- component_id: compute_option_a_veta
  failure_semantics: []
  implementation_constraints:
  - veta_a = spot_a*(zeta_a**0.5)*N'(d1_zeta_a)*(1/(2*sqrt(T_a)) - d1_zeta_a*dd1_dT_a)
  input_ports:
