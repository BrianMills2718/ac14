components:
- component_id: receive_portfolio_request
  failure_semantics: []
  implementation_constraints:
  - Pass all fields from portfolio_request to portfolio_params_output unchanged.
  input_ports:
  - arrival_policy: required_latest
    description: Full portfolio specification.
    name: portfolio_request
    required: true
    schema_id: PortfolioRequest
  kind: source
  local_invariants:
  - output contains all input fields unchanged
  output_ports:
  - description: All portfolio fields passed through.
    name: portfolio_params_output
    schema_id: PortfolioParams
  purpose: Receive flat portfolio_request and pass all fields through as portfolio_params_output.
  semantic_responsibility: receive_and_pass_through_portfolio_request
- component_id: compute_option_a_d_params
  failure_semantics: []
  implementation_constraints:
  - disc_alpha_a = exp(-(rate_a**alpha_a)*T_a)
  - d1_zeta_a = (log(spot_a/strike_a) + (rate_a + zeta_a*vol_a**2/2)*T_a) / (vol_a*sqrt(T_a))
  - d2_zeta_a = d1_zeta_a - zeta_a*vol_a*sqrt(T_a)
  - dd1_dT_a = (rate_a + zeta_a*vol_a**2/2) / (vol_a*sqrt(T_a)) - d1_zeta_a/(2*T_a)
  input_ports:
  - arrival_policy: required_latest
    description: Portfolio params from source.
    name: portfolio_params_output
    required: true
    schema_id: PortfolioParams
  kind: transform
  local_invariants:
  - disc_alpha_a == exp(-(rate_a**alpha_a)*T_a)
  - d2_zeta_a == d1_zeta_a - zeta_a*vol_a*sqrt(T_a)
  output_ports:
  - description: Option A d-params output.
    name: option_a_params_output
    schema_id: OptionAParams
  purpose: Compute d1_zeta_a, d2_zeta_a, disc_alpha_a, dd1_dT_a for Option A.
  semantic_responsibility: compute_option_a_zeta_d_params
- component_id: price_option_a_call
  failure_semantics: []
  implementation_constraints:
  - call_price_a = spot_a*N(d1_zeta_a) - strike_a*disc_alpha_a*N(d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute call_price_a. output.
    name: option_a_call_output
    schema_id: OptionACallOutput
  purpose: Compute call_price_a.
  semantic_responsibility: price_option_a_call
- component_id: price_option_a_put
  failure_semantics: []
  implementation_constraints:
  - put_price_a = strike_a*disc_alpha_a*N(-d2_zeta_a) - spot_a*N(-d1_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute put_price_a. output.
    name: option_a_put_output
    schema_id: OptionAPutOutput
  purpose: Compute put_price_a.
  semantic_responsibility: price_option_a_put
- component_id: compute_option_a_delta
  failure_semantics: []
  implementation_constraints:
  - delta_call_a = zeta_a*N(d1_zeta_a)
  - delta_put_a = zeta_a*N(d1_zeta_a) - 1
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute zeta-scaled delta for Option A. output.
    name: option_a_delta_output
    schema_id: OptionADeltaOutput
  purpose: Compute zeta-scaled delta for Option A.
  semantic_responsibility: compute_option_a_delta
- component_id: compute_option_a_gamma
  failure_semantics: []
  implementation_constraints:
  - gamma_a = zeta_a*N'(d1_zeta_a)/(spot_a*vol_a*sqrt(T_a))
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute zeta-scaled gamma for Option A. output.
    name: option_a_gamma_output
    schema_id: OptionAGammaOutput
  purpose: Compute zeta-scaled gamma for Option A.
  semantic_responsibility: compute_option_a_gamma
- component_id: compute_option_a_theta_call
  failure_semantics: []
  implementation_constraints:
  - theta_call_a = -(spot_a*N'(d1_zeta_a)*vol_a*zeta_a)/(2*sqrt(T_a)) - (rate_a**alpha_a)*strike_a*disc_alpha_a*N(d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute theta for Option A call. output.
    name: option_a_theta_call_output
    schema_id: OptionAThetaCallOutput
  purpose: Compute theta for Option A call.
  semantic_responsibility: compute_option_a_theta_call
- component_id: compute_option_a_theta_put
  failure_semantics: []
  implementation_constraints:
  - theta_put_a = -(spot_a*N'(d1_zeta_a)*vol_a*zeta_a)/(2*sqrt(T_a)) + (rate_a**alpha_a)*strike_a*disc_alpha_a*N(-d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute theta for Option A put. output.
    name: option_a_theta_put_output
    schema_id: OptionAThetaPutOutput
  purpose: Compute theta for Option A put.
  semantic_responsibility: compute_option_a_theta_put
- component_id: compute_option_a_vega
  failure_semantics: []
  implementation_constraints:
  - vega_a = spot_a*N'(d1_zeta_a)*sqrt(T_a)*(zeta_a**0.5)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute zeta-corrected vega for Option A. output.
    name: option_a_vega_output
    schema_id: OptionAVegaOutput
  purpose: Compute zeta-corrected vega for Option A.
  semantic_responsibility: compute_option_a_vega
- component_id: compute_option_a_rho_call
  failure_semantics: []
  implementation_constraints:
  - rho_call_a = alpha_a*strike_a*T_a*(rate_a**(alpha_a-1))*disc_alpha_a*N(d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute rho_call for Option A. output.
    name: option_a_rho_call_output
    schema_id: OptionARhoCallOutput
  purpose: Compute rho_call for Option A.
  semantic_responsibility: compute_option_a_rho_call
- component_id: compute_option_a_rho_put
  failure_semantics: []
  implementation_constraints:
  - rho_put_a = -alpha_a*strike_a*T_a*(rate_a**(alpha_a-1))*disc_alpha_a*N(-d2_zeta_a)
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute rho_put for Option A. output.
    name: option_a_rho_put_output
    schema_id: OptionARhoPutOutput
  purpose: Compute rho_put for Option A.
  semantic_responsibility: compute_option_a_rho_put
- component_id: compute_option_a_vanna
  failure_semantics: []
  implementation_constraints:
  - vanna_a = -zeta_a*N'(d1_zeta_a)*d2_zeta_a/vol_a
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute vanna for Option A. output.
    name: option_a_vanna_output
    schema_id: OptionAVannaOutput
  purpose: Compute vanna for Option A.
  semantic_responsibility: compute_option_a_vanna
- component_id: compute_option_a_volga
  failure_semantics: []
  implementation_constraints:
  - volga_a = vega_a*d1_zeta_a*d2_zeta_a/vol_a
  input_ports:
  - arrival_policy: required_latest
    description: Option A d-params.
    name: option_a_params_output
    required: true
    schema_id: OptionAParams
  - arrival_policy: required_latest
    description: vega_a
    name: option_a_vega_output
    required: true
    schema_id: OptionAVegaOutput
  kind: transform
  local_invariants: []
  output_ports:
  - description: Compute volga for Option A. output.
    name: option_a_volga_output
    schema_id: OptionAVolgaOutput
  purpose: Compute volga for Option A.
  semantic_responsibility: compute_option_a_volga
- component_id: compute_option_a_charm
  failure_semantics: []
  implementation_constraints:
