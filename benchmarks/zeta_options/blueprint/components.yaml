components:
- component_id: compute_zeta_d_params
  kind: transform
  purpose: Compute zeta-modified d1_zeta, d2_zeta, and fractional-power discount disc_alpha.
  semantic_responsibility: compute_zeta_d_parameters_and_fractional_discount
  input_ports:
  - name: zeta_request
    schema_id: ZetaRequest
    description: Option parameters including zeta and alpha.
    required: true
    arrival_policy: required_latest
  output_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    description: d1_zeta, d2_zeta, disc_alpha.
  local_invariants:
  - d2_zeta == d1_zeta - zeta*volatility*sqrt(time_to_expiry)
  - 0 < disc_alpha < 1
  failure_semantics:
  - fail if spot <= 0 or strike <= 0 or time_to_expiry <= 0
  implementation_constraints:
  - disc_alpha = exp(-(rate**alpha) * time_to_expiry)
  - d1_zeta = (log(spot/strike) + (rate + zeta*volatility**2/2)*time_to_expiry) / (volatility*sqrt(time_to_expiry))
  - d2_zeta = d1_zeta - zeta*volatility*sqrt(time_to_expiry)

- component_id: price_zeta_call
  kind: transform
  purpose: Compute zeta-modified European call price using disc_alpha discount.
  semantic_responsibility: compute_zeta_call_price
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, d2_zeta, disc_alpha.
  output_ports:
  - name: call_price_output
    schema_id: ZetaCallOutput
    description: Zeta call price.
  local_invariants:
  - call_price >= 0
  failure_semantics: []
  implementation_constraints:
  - call_price = spot*N(d1_zeta) - strike*disc_alpha*N(d2_zeta)

- component_id: price_zeta_put
  kind: transform
  purpose: Compute zeta-modified European put price using disc_alpha discount.
  semantic_responsibility: compute_zeta_put_price
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, d2_zeta, disc_alpha.
  output_ports:
  - name: put_price_output
    schema_id: ZetaPutOutput
    description: Zeta put price.
  local_invariants:
  - put_price >= 0
  failure_semantics: []
  implementation_constraints:
  - put_price = strike*disc_alpha*N(-d2_zeta) - spot*N(-d1_zeta)

- component_id: compute_zeta_delta
  kind: transform
  purpose: Compute zeta-scaled delta for call and put. CRITICAL - multiply by zeta.
  semantic_responsibility: compute_zeta_delta
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, zeta.
  output_ports:
  - name: delta_output
    schema_id: ZetaDeltaOutput
    description: Zeta-scaled delta for call and put.
  local_invariants:
  - 0 < delta_call < zeta
  - -1 < delta_put < 0
  failure_semantics: []
  implementation_constraints:
  - delta_call = zeta * N(d1_zeta)
  - delta_put = zeta * N(d1_zeta) - 1.0

- component_id: compute_zeta_gamma
  kind: transform
  purpose: Compute zeta-scaled gamma. CRITICAL - multiply by zeta.
  semantic_responsibility: compute_zeta_gamma
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, zeta.
  output_ports:
  - name: gamma_output
    schema_id: ZetaGammaOutput
    description: Zeta-scaled gamma.
  local_invariants:
  - gamma > 0
  failure_semantics: []
  implementation_constraints:
  - gamma = zeta * N_prime(d1_zeta) / (spot*volatility*sqrt(time_to_expiry))

- component_id: compute_zeta_theta_call
  kind: transform
  purpose: Compute zeta-alpha-modified theta for call. Uses r^alpha and disc_alpha.
  semantic_responsibility: compute_zeta_theta_call
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, d2_zeta, disc_alpha, zeta, alpha.
  output_ports:
  - name: theta_call_output
    schema_id: ZetaThetaCallOutput
    description: Zeta-alpha theta for call.
  local_invariants:
  - theta_call < 0
  failure_semantics: []
  implementation_constraints:
  - term1 = -(spot * N_prime(d1_zeta) * volatility * zeta) / (2 * sqrt(time_to_expiry))
  - term2 = -(rate**alpha) * strike * disc_alpha * N(d2_zeta)
  - theta_call = term1 + term2

- component_id: compute_zeta_theta_put
  kind: transform
  purpose: Compute zeta-alpha-modified theta for put. Second term is POSITIVE and uses N(-d2_zeta).
  semantic_responsibility: compute_zeta_theta_put
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, d2_zeta, disc_alpha, zeta, alpha.
  output_ports:
  - name: theta_put_output
    schema_id: ZetaThetaPutOutput
    description: Zeta-alpha theta for put.
  local_invariants: []
  failure_semantics: []
  implementation_constraints:
  - term1 = -(spot * N_prime(d1_zeta) * volatility * zeta) / (2 * sqrt(time_to_expiry))
  - term2 = +(rate**alpha) * strike * disc_alpha * N(-d2_zeta)
  - theta_put = term1 + term2

- component_id: compute_zeta_vega
  kind: transform
  purpose: Compute zeta-sqrt-modified vega. Correction is zeta^0.5 NOT zeta.
  semantic_responsibility: compute_zeta_vega
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d1_zeta, zeta.
  output_ports:
  - name: vega_output
    schema_id: ZetaVegaOutput
    description: Zeta-sqrt vega.
  local_invariants:
  - vega > 0
  failure_semantics: []
  implementation_constraints:
  - vega = spot * N_prime(d1_zeta) * sqrt(time_to_expiry) * (zeta**0.5)

- component_id: compute_zeta_rho_call
  kind: transform
  purpose: Compute alpha-modified rho for call. Three differences from standard BS.
  semantic_responsibility: compute_zeta_rho_call
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d2_zeta, disc_alpha, alpha.
  output_ports:
  - name: rho_call_output
    schema_id: ZetaRhoCallOutput
    description: Alpha-modified rho for call.
  local_invariants:
  - rho_call > 0
  failure_semantics: []
  implementation_constraints:
  - rho_call = alpha * strike * time_to_expiry * (rate**(alpha-1)) * disc_alpha * N(d2_zeta)

- component_id: compute_zeta_rho_put
  kind: transform
  purpose: Compute alpha-modified rho for put and assemble final ZetaResults.
  semantic_responsibility: compute_zeta_rho_put_and_assemble
  input_ports:
  - name: d_params_output
    schema_id: ZetaDParamsOutput
    required: true
    arrival_policy: required_latest
    description: d2_zeta, disc_alpha, alpha.
  - name: call_price_output
    schema_id: ZetaCallOutput
    required: true
    arrival_policy: required_latest
    description: Call price.
  - name: put_price_output
    schema_id: ZetaPutOutput
    required: true
    arrival_policy: required_latest
    description: Put price.
  - name: delta_output
    schema_id: ZetaDeltaOutput
    required: true
    arrival_policy: required_latest
    description: Delta call and put.
  - name: gamma_output
    schema_id: ZetaGammaOutput
    required: true
    arrival_policy: required_latest
    description: Gamma.
  - name: theta_call_output
    schema_id: ZetaThetaCallOutput
    required: true
    arrival_policy: required_latest
    description: Theta call.
  - name: theta_put_output
    schema_id: ZetaThetaPutOutput
    required: true
    arrival_policy: required_latest
    description: Theta put.
  - name: vega_output
    schema_id: ZetaVegaOutput
    required: true
    arrival_policy: required_latest
    description: Vega.
  - name: rho_call_output
    schema_id: ZetaRhoCallOutput
    required: true
    arrival_policy: required_latest
    description: Rho call.
  output_ports:
  - name: zeta_results
    schema_id: ZetaResults
    description: Complete zeta-modified option pricing results.
  local_invariants:
  - rho_put < 0
  failure_semantics: []
  implementation_constraints:
  - rho_put = -alpha * strike * time_to_expiry * (rate**(alpha-1)) * disc_alpha * N(-d2_zeta)
  - assemble ZetaResults from all upstream outputs
