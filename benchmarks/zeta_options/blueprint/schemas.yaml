schemas:
- schema_id: ZetaRequest
  kind: object
  description: Input option specification with zeta and alpha parameters.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable case identifier.
  - name: spot
    type: number
    required: true
    description: Spot price S.
  - name: strike
    type: number
    required: true
    description: Strike price K.
  - name: rate
    type: number
    required: true
    description: Risk-free rate r.
  - name: volatility
    type: number
    required: true
    description: Volatility sigma.
  - name: time_to_expiry
    type: number
    required: true
    description: Time to expiry T.
  - name: zeta
    type: number
    required: true
    description: Zeta scaling parameter.
  - name: alpha
    type: number
    required: true
    description: Alpha fractional power for discount.

- schema_id: ZetaDParamsOutput
  kind: object
  description: Zeta-modified d1, d2, and fractional-power discount factor plus all original params.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable case identifier.
  - name: spot
    type: number
    required: true
    description: Spot price S.
  - name: strike
    type: number
    required: true
    description: Strike price K.
  - name: rate
    type: number
    required: true
    description: Risk-free rate r.
  - name: volatility
    type: number
    required: true
    description: Volatility sigma.
  - name: time_to_expiry
    type: number
    required: true
    description: Time to expiry T.
  - name: zeta
    type: number
    required: true
    description: Zeta scaling parameter.
  - name: alpha
    type: number
    required: true
    description: Alpha fractional power.
  - name: d1_zeta
    type: number
    required: true
    description: Zeta-modified d1 parameter.
  - name: d2_zeta
    type: number
    required: true
    description: Zeta-modified d2 parameter. d2_zeta = d1_zeta - zeta*sigma*sqrt(T).
  - name: disc_alpha
    type: number
    required: true
    description: Fractional discount exp(-r^alpha * T).

