schemas:
- schema_id: BsRequest
  kind: object
  description: Input option specification.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable case identifier.
  - name: spot
    type: number
    required: true
    description: Spot price S.
  - name: strike
    type: number
    required: true
    description: Strike price K.
  - name: rate
    type: number
    required: true
    description: Risk-free rate r.
  - name: volatility
    type: number
    required: true
    description: Volatility sigma.
  - name: time_to_expiry
    type: number
    required: true
    description: Time to expiry T.
- schema_id: DParamsOutput
  kind: object
  description: d1, d2, and discount factor.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable case identifier.
  - name: spot
    type: number
    required: true
    description: Spot price S.
  - name: strike
    type: number
    required: true
    description: Strike price K.
  - name: rate
    type: number
    required: true
    description: Risk-free rate r.
  - name: volatility
    type: number
    required: true
    description: Volatility sigma.
  - name: time_to_expiry
    type: number
    required: true
    description: Time to expiry T.
  - name: d1
    type: number
    required: true
    description: Standardized d1.
  - name: d2
    type: number
    required: true
    description: Standardized d2.
  - name: disc
    type: number
    required: true
    description: Discount factor exp(-rT).
- schema_id: BsResults
  kind: object
  description: Complete option pricing results.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable case identifier.
  - name: d1
    type: number
    required: true
    description: Standardized d1.
  - name: d2
    type: number
    required: true
    description: Standardized d2.
  - name: call_price
    type: number
    required: true
    description: European call price.
  - name: put_price
    type: number
    required: true
    description: European put price.
  - name: delta_call
    type: number
    required: true
    description: Call delta.
  - name: delta_put
    type: number
    required: true
    description: Put delta.
  - name: gamma
    type: number
    required: true
    description: Gamma.
  - name: theta_call
    type: number
    required: true
    description: Theta for call.
  - name: theta_put
    type: number
    required: true
    description: Theta for put.
  - name: vega
    type: number
    required: true
    description: Vega.
  - name: rho_call
    type: number
    required: true
    description: Rho for call.
  - name: rho_put
    type: number
    required: true
    description: Rho for put.
