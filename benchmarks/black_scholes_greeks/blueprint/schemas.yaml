    type: string
    required: true
    description: Passed through.
  - name: S
    type: number
    required: true
    description: Stock price (passed through).
  - name: K
    type: number
    required: true
    description: Strike price (passed through).
  - name: r
    type: number
    required: true
    description: Risk-free rate (passed through).
  - name: sigma
    type: number
    required: true
    description: Volatility (passed through).
  - name: T
    type: number
    required: true
    description: Time to expiry (passed through).
  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price for IV (passed through).
  - name: sqrt_T
    type: number
    required: true
    description: sqrt(T) (passed through).
  - name: d1
    type: number
    required: true
    description: d1 (passed through).
  - name: d2
    type: number
    required: true
    description: d2 (passed through).
  - name: discount_factor
    type: number
    required: true
    description: exp(-r*T) (passed through).
  - name: N_d1
    type: number
    required: true
    description: N(d1) (passed through).
  - name: N_d2
    type: number
    required: true
    description: N(d2) (passed through).
  - name: N_neg_d1
    type: number
    required: true
    description: N(-d1) (passed through).
  - name: N_neg_d2
    type: number
    required: true
    description: N(-d2) (passed through).
  - name: N_prime_d1
    type: number
    required: true
    description: N'(d1) (passed through).
  - name: call_price
    type: number
    required: true
    description: "S*N(d1) - K*discount_factor*N(d2)."

- schema_id: PutPricedState
  kind: object
  description: >
    State after Stage 4: put_price added. All CallPricedState fields plus put_price.
  fields:
  - name: case_id
    type: string
    required: true
    description: Passed through.
  - name: S
    type: number
    required: true
    description: Stock price (passed through).
  - name: K
    type: number
    required: true
    description: Strike price (passed through).
  - name: r
    type: number
    required: true
    description: Risk-free rate (passed through).
  - name: sigma
    type: number
    required: true
    description: Volatility (passed through).
  - name: T
    type: number
    required: true
    description: Time to expiry (passed through).
  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price for IV (passed through).
  - name: sqrt_T
    type: number
    required: true
    description: sqrt(T) (passed through).
  - name: d1
    type: number
    required: true
    description: d1 (passed through).
  - name: d2
    type: number
    required: true
    description: d2 (passed through).
  - name: discount_factor
    type: number
    required: true
    description: exp(-r*T) (passed through).
  - name: N_d1
    type: number
    required: true
