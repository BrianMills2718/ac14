- schema_id: ThetaState
  kind: object
  description: >
    State after Stage 7: theta_call and theta_put added. All GammaState fields
    plus theta_call and theta_put.
  fields:
  - name: case_id
    type: string
    required: true
    description: Passed through.
  - name: S
    type: number
    required: true
    description: Stock price (passed through).
  - name: K
    type: number
    required: true
    description: Strike price (passed through).
  - name: r
    type: number
