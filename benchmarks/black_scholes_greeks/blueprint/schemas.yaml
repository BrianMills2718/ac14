  - name: put_price
    type: number
    required: true
    description: Put price (passed through).
  - name: delta_call
    type: number
    required: true
    description: delta_call (passed through).
  - name: delta_put
    type: number
    required: true
    description: delta_put (passed through).
  - name: gamma
    type: number
    required: true
    description: gamma (passed through).
  - name: theta_call
    type: number
    required: true
    description: "-(S*N'(d1)*sigma)/(2*sqrt_T) - r*K*disc*N(d2). Typically negative."
  - name: theta_put
    type: number
    required: true
    description: "-(S*N'(d1)*sigma)/(2*sqrt_T) + r*K*disc*N(-d2). Sign and argument differ from theta_call."

- schema_id: VegaRhoState
  kind: object
  description: >
    State after Stage 8: vega, rho_call, rho_put added. All ThetaState fields
    plus vega, rho_call, rho_put.
  fields:
