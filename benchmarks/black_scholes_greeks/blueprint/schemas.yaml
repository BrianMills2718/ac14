  - name: d2
    type: number
    required: true
    description: d2 (passed through).
  - name: discount_factor
    type: number
    required: true
    description: exp(-r*T) (passed through).
  - name: N_d1
    type: number
    required: true
    description: N(d1) (passed through).
  - name: N_d2
    type: number
    required: true
    description: N(d2) (passed through).
  - name: N_neg_d1
    type: number
    required: true
    description: N(-d1) (passed through).
  - name: N_neg_d2
    type: number
    required: true
    description: N(-d2) (passed through).
  - name: N_prime_d1
    type: number
    required: true
    description: N'(d1) (passed through).
  - name: call_price
    type: number
    required: true
    description: Call price (passed through).
  - name: put_price
    type: number
    required: true
    description: Put price (passed through).
  - name: delta_call
    type: number
    required: true
    description: delta_call (passed through).
  - name: delta_put
    type: number
    required: true
    description: delta_put (passed through).
  - name: gamma
    type: number
    required: true
    description: gamma (passed through).
  - name: theta_call
    type: number
    required: true
    description: theta_call (passed through).
  - name: theta_put
    type: number
    required: true
    description: theta_put (passed through).
  - name: vega
    type: number
    required: true
    description: "S*N'(d1)*sqrt_T. Positive."
  - name: rho_call
    type: number
    required: true
    description: "K*T*discount_factor*N(d2). Positive."
  - name: rho_put
    type: number
    required: true
    description: "-K*T*discount_factor*N(-d2). Negative."

- schema_id: BSGreeksResult
  kind: object
  description: >
    Final output record containing all Black-Scholes pricing and Greeks.
    Emitted by compute_implied_volatility_and_assemble (Stage 9).
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable benchmark case identifier (passed through from input).
  - name: call_price
    type: number
    required: true
    description: "S*N(d1) - K*disc*N(d2)."
  - name: put_price
    type: number
    required: true
    description: "K*disc*N(-d2) - S*N(-d1)."
  - name: delta_call
    type: number
    required: true
    description: "N(d1). In (0,1)."
  - name: delta_put
    type: number
    required: true
    description: "N(d1) - 1.0. In (-1,0)."
  - name: gamma
    type: number
    required: true
    description: "N'(d1)/(S*sigma*sqrt_T). Positive."
  - name: theta_call
    type: number
    required: true
    description: Theta for call option. Typically negative.
  - name: theta_put
    type: number
    required: true
    description: Theta for put option. Typically negative but less negative than theta_call.
  - name: vega
    type: number
    required: true
    description: "S*N'(d1)*sqrt_T. Positive."
  - name: rho_call
    type: number
    required: true
    description: "K*T*disc*N(d2). Positive."
  - name: rho_put
    type: number
    required: true
    description: "-K*T*disc*N(-d2). Negative."
  - name: implied_volatility
    type: number
    required: true
    description: Newton-Raphson IV from market_price_for_iv (20 iter, sigma_0=0.25).
