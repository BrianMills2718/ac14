schemas:
- schema_id: BSRequest
  kind: object
  description: >
    Complete option specification with pricing parameters. This is the sole external
    input to the pipeline, received by compute_d_values.
  fields:
  - name: case_id
    type: string
    required: true
    description: Stable benchmark case identifier passed through to the final output.
  - name: S
    type: number
    required: true
    description: Current stock price (spot price). Strictly positive.
  - name: K
    type: number
    required: true
    description: Option strike price. Strictly positive.
  - name: r
    type: number
    required: true
    description: Continuously compounded risk-free interest rate.
  - name: sigma
    type: number
    required: true
    description: Volatility of the underlying asset. Used for d1/d2 and all Greeks.
  - name: T
    type: number
    required: true
    description: Time to option expiry in years.
  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price used as target for Newton-Raphson IV computation.

- schema_id: DValuesState
  kind: object
  description: >
    State after Stage 1: d1, d2, sqrt_T, and discount_factor computed, plus all
    original request fields passed through.
  fields:
  - name: case_id
    type: string
    required: true
    description: Passed through from BSRequest.
  - name: S
    type: number
    required: true
    description: Stock price (passed through).
  - name: K
    type: number
    required: true
    description: Strike price (passed through).
  - name: r
    type: number
    required: true
    description: Risk-free rate (passed through).
  - name: sigma
    type: number
    required: true
    description: Volatility (passed through).
  - name: T
    type: number
    required: true
    description: Time to expiry (passed through).
  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price for IV (passed through).
  - name: sqrt_T
    type: number
    required: true
    description: Square root of T. Precomputed for reuse.
  - name: d1
    type: number
    required: true
    description: "d1 = (ln(S/K) + (r + sigma^2/2)*T) / (sigma*sqrt_T)."
  - name: d2
    type: number
    required: true
    description: "d2 = d1 - sigma*sqrt_T."
  - name: discount_factor
    type: number
    required: true
    description: "exp(-r*T). Precomputed for reuse."

- schema_id: NormalValuesState
  kind: object
  description: >
    State after Stage 2: standard normal CDF and PDF values computed at d1 and d2.
    All DValuesState fields plus five normal distribution values.
  fields:
  - name: case_id
    type: string
    required: true
    description: Passed through.
  - name: S
    type: number
    required: true
    description: Stock price (passed through).
  - name: K
    type: number
    required: true
    description: Strike price (passed through).
  - name: r
    type: number
    required: true
    description: Risk-free rate (passed through).
  - name: sigma
    type: number
    required: true
    description: Volatility (passed through).
  - name: T
    type: number
    required: true
    description: Time to expiry (passed through).
  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price for IV (passed through).
  - name: sqrt_T
    type: number
    required: true
    description: sqrt(T) (passed through from Stage 1).
  - name: d1
    type: number
    required: true
    description: d1 (passed through from Stage 1).
  - name: d2
    type: number
    required: true
    description: d2 (passed through from Stage 1).
  - name: discount_factor
    type: number
    required: true
    description: exp(-r*T) (passed through from Stage 1).
  - name: N_d1
    type: number
    required: true
    description: "N(d1) = norm.cdf(d1). Standard normal CDF at d1."
  - name: N_d2
    type: number
    required: true
    description: "N(d2) = norm.cdf(d2). Standard normal CDF at d2."
  - name: N_neg_d1
    type: number
    required: true
    description: "N(-d1) = norm.cdf(-d1). Called with negative argument."
  - name: N_neg_d2
    type: number
    required: true
    description: "N(-d2) = norm.cdf(-d2). Called with negative argument."
  - name: N_prime_d1
    type: number
    required: true
    description: "N'(d1) = norm.pdf(d1). Standard normal PDF at d1. Used for gamma, theta, vega."

- schema_id: CallPricedState
  kind: object
  description: >
    State after Stage 3: call_price added. All NormalValuesState fields plus call_price.
  fields:
