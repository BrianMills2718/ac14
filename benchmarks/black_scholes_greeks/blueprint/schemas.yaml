  - name: N_neg_d1
    type: number
    required: true
    description: N(-d1) (passed through).
  - name: N_neg_d2
    type: number
    required: true
    description: N(-d2) (passed through).
  - name: N_prime_d1
    type: number
    required: true
    description: N'(d1) (passed through).
  - name: call_price
    type: number
    required: true
    description: Call price (passed through).
  - name: put_price
    type: number
    required: true
    description: "K*discount_factor*N(-d2) - S*N(-d1)."

- schema_id: DeltaState
  kind: object
  description: >
    State after Stage 5: delta_call and delta_put added. All PutPricedState fields
