  - name: market_price_for_iv
    type: number
    required: true
    description: Market call price for IV (passed through).
  - name: sqrt_T
    type: number
    required: true
    description: sqrt(T) (passed through).
  - name: d1
    type: number
    required: true
    description: d1 (passed through).
  - name: d2
    type: number
    required: true
    description: d2 (passed through).
  - name: discount_factor
    type: number
    required: true
    description: exp(-r*T) (passed through).
  - name: N_d1
    type: number
    required: true
    description: N(d1) (passed through).
  - name: N_d2
    type: number
    required: true
    description: N(d2) (passed through).
  - name: N_neg_d1
    type: number
    required: true
    description: N(-d1) (passed through).
  - name: N_neg_d2
    type: number
    required: true
    description: N(-d2) (passed through).
  - name: N_prime_d1
    type: number
    required: true
    description: N'(d1) (passed through).
  - name: call_price
    type: number
    required: true
    description: Call price (passed through).
  - name: put_price
    type: number
    required: true
    description: Put price (passed through).
  - name: delta_call
    type: number
    required: true
    description: "N(d1). In (0, 1)."
  - name: delta_put
    type: number
    required: true
    description: "N(d1) - 1.0. In (-1, 0)."

