system_name: Resource Scaling Decision System
purpose: >
  Decide whether cloud resources should scale for each incoming raw scaling
  event while preserving the exact categorical runtime decision contract reused
  by the existing resource_scaling benchmark assets.
requirements:
  - consume the raw resource_scaling runtime-case shape directly without alias-only wrappers
  - keep threshold, service-policy, compliance, and execution rules explicit and reviewable
  - produce one exact scaling_decision_entry and rolling scaling_decision_store for each event
  - preserve categorical, boolean, and integer final fields required by the existing runtime evaluation
  - remain decomposable into bounded reviewable components instead of one opaque whole-task module
success_criteria:
  - generated systems can consume the reused runtime cases directly
  - final outputs match the exact reviewable fields required by the resource_scaling benchmark
  - blocked actions remain explicit instead of silently downgrading to no-op
  - the bundle stays truthful to the runtime assets it reuses
business_rules:
  - "THRESHOLD: cpu_breach = cpu_utilization >= 0.80; memory_breach = memory_utilization >= 0.85; error_breach = error_rate >= 0.05; breach_count = sum of true breach flags (0-3)"
  - "ACTION: scale_out ONLY when BOTH cpu_breach AND memory_breach are true; scale_up ONLY when cpu_breach is true AND memory_breach is false; scale_down when no breach AND request_rate_rps < 20; none otherwise"
  - "URGENCY: critical when error_breach is true OR breach_count >= 3; high when breach_count == 2 (and not critical); medium when breach_count == 1 (and not critical); low when breach_count == 0"
  - "TIER MAPPING: bronze -> budget; silver -> standard; gold -> standard; platinum -> premium"
  - "DEPLOY RISK: high when last_deploy_hours < 4; medium when last_deploy_hours < 24; low otherwise"
  - "TARGET ADJUSTMENT: max(1, min(breach_count, max_scale_adjustment)) when action != none; 0 otherwise. max_scale_adjustment: budget=1, standard=2, premium=4"
  - "MIN HEALTHY: budget=1, standard=2, premium=3"
  - "AUTO SCALE ENABLED: true for standard and premium; false for budget"
  - "REQUIRES APPROVAL: false when premium tier OR (standard tier AND urgency in [low, medium]); true otherwise (standard+high/critical, any budget)"
  - "APPROVAL TIER: auto when premium OR (standard AND urgency in [low, medium]); director when standard AND urgency=critical; manager when (standard AND urgency=high) OR (any budget tier regardless of urgency)"
  - "STRATEGY AND COOLDOWN: immediate+5min when urgency=critical AND deploy_risk=low; staged+15min when deploy_risk in [high, medium] OR urgency=high; deferred+30min when urgency in [low, medium] AND deploy_risk=low; blocked+0min when execution gate blocks. This strategy applies even when action=none."
  - "ALERT TIER: critical when error_breach is true OR urgency=critical; warning when urgency=high (no error breach, not critical); info otherwise"
  - "COMPLIANCE CONFLICT: true when (in_change_freeze AND urgency != critical) OR (in_maintenance_window AND action != none)"
  - "AUTHORIZATION MODE: compliance_blocked FIRST when conflict is true; auto when NOT conflict AND NOT requires_approval AND auto_scale_enabled; manual otherwise (conflict=false but approval required or auto_scale disabled)"
  - "FINAL ACTION: blocked if execution_gate.blocked is true; else recommendation.action"
  - "FINAL STRATEGY: blocked if execution_gate.blocked is true; else scaling_plan.strategy"
  - bronze maps to budget, silver/gold to standard, platinum to premium
  - compliance blocks non-none actions during maintenance and blocks change-freeze actions unless urgency is critical
  - all final-output fields are categorical, boolean, or integer and should match exactly
inputs:
  - name: raw_scaling_event
    kind: record
    description: Raw cloud metrics event for one scaling decision, matching the reused runtime cases exactly.
    fields:
      - field_name: case_id
        field_type: str
        description: Stable benchmark case identifier.
        required: true
      - field_name: received_at
        field_type: str
        description: Timestamp when the metrics event was received.
        required: true
      - field_name: service_id
        field_type: str
        description: Stable service identifier under review.
        required: true
      - field_name: service_tier
        field_type: str
        description: Service tier. Valid values are bronze, silver, gold, and platinum.
        required: true
      - field_name: cpu_utilization
        field_type: float
        description: Current CPU utilization ratio.
        required: true
      - field_name: memory_utilization
        field_type: float
        description: Current memory utilization ratio.
        required: true
      - field_name: error_rate
        field_type: float
        description: Current request error ratio.
        required: true
      - field_name: request_rate_rps
        field_type: int
        description: Current request rate in requests per second.
        required: true
      - field_name: last_deploy_hours
        field_type: int
        description: Hours since the last deploy.
        required: true
      - field_name: in_change_freeze
        field_type: bool
        description: Whether non-critical scaling changes are blocked.
        required: true
      - field_name: in_maintenance_window
        field_type: bool
        description: Whether the service is in a maintenance window.
        required: true
outputs:
  - name: scaling_decision_entry
    kind: record
    description: Final exact single-case scaling decision emitted for one raw scaling event.
    fields:
      - field_name: case_id
        field_type: str
        description: Stable benchmark case identifier.
        required: true
      - field_name: service_id
        field_type: str
        description: Stable service identifier under review.
        required: true
      - field_name: action
        field_type: str
        description: Final categorical scaling action.
        required: true
      - field_name: urgency
        field_type: str
        description: Final urgency band for the decision.
        required: true
      - field_name: strategy
        field_type: str
        description: Final categorical scaling strategy.
        required: true
      - field_name: target_adjustment
        field_type: int
        description: Final requested adjustment count.
        required: true
      - field_name: approval_tier
        field_type: str
        description: Final approval tier. Valid values are auto, manager, and director.
        required: true
      - field_name: authorization_mode
        field_type: str
        description: Final authorization mode. Valid values are auto, manual, and compliance_blocked.
        required: true
      - field_name: alert_tier
        field_type: str
        description: Final alert tier. Valid values are critical, warning, and info.
        required: true
      - field_name: scale_tier
        field_type: str
        description: Final scale tier. Valid values are budget, standard, and premium.
        required: true
      - field_name: blocked
        field_type: bool
        description: Whether the final decision is blocked.
        required: true
      - field_name: requires_approval
        field_type: bool
        description: Whether human approval is required before execution.
        required: true
      - field_name: min_healthy_instances
        field_type: int
        description: Minimum healthy instances required during scaling.
        required: true
      - field_name: cooldown_minutes
        field_type: int
        description: Cooldown window for the final scaling strategy.
        required: true
  - name: scaling_decision_store
    kind: record
    description: Rolling deterministic store of exact scaling decisions.
    fields:
      - field_name: generated_at
        field_type: str
        description: Timestamp associated with the current rolling store snapshot.
        required: true
      - field_name: decisions
        field_type: list[record]
        description: Ordered exact decision entries accumulated over time.
        required: true
workflow_hints:
  - hint_id: normalize_scaling_event
    summary: Normalize and validate the raw scaling event; pass cleaned event data to downstream components.
    input_names: [raw_scaling_event]
    output_names: [raw_scaling_event]
    business_rules:
      - This component only normalizes and validates input fields (types, allowed values, ranges).
      - "CRITICAL: This component must NOT emit scaling_decision_entry. Its output is the normalized
        raw event (same fields as input, but validated). The decision fields (action, urgency, etc.)
        are computed by the downstream policy evaluation component."
      - Preserve case_id, service_id, tier, deploy timing, and compliance flags for later stages.
  - hint_id: evaluate_thresholds_and_policy
    summary: Compute the full scaling recommendation from the normalized event; this component computes ALL decision fields.
    input_names: [raw_scaling_event]
    output_names: [scaling_decision_entry]
    business_rules:
      - "This component computes ALL scaling decision fields: action, urgency, strategy, target_adjustment,
        approval_tier, requires_approval, authorization_mode, alert_tier, scale_tier, min_healthy_instances,
        cooldown_minutes, blocked, case_id, service_id."
      - Map service_tier to scale_tier exactly as bronze->budget, silver/gold->standard, platinum->premium.
      - Apply ALL threshold, urgency, tier mapping, deploy risk, target adjustment, approval, strategy, alert, and authorization rules.
      - "APPROVAL TIER: auto when premium OR (standard AND urgency in [low, medium]); director when
        standard AND urgency=critical; manager when (standard AND urgency=high) OR (any budget tier)."
      - "AUTHORIZATION MODE: compliance_blocked FIRST when conflict=true; auto when not conflict AND
        not requires_approval AND auto_scale_enabled; manual otherwise."
      - "STRATEGY: deferred+30min when urgency in [low, medium] AND deploy_risk=low. This applies
        even when action=none."
  - hint_id: apply_compliance_and_execution
    summary: Apply compliance gating and emit the FINAL scaling_decision_entry with any overrides applied.
    input_names: [raw_scaling_event, scaling_decision_entry]
    output_names: [scaling_decision_entry]
    business_rules:
      - "CRITICAL: This is the TERMINAL emitter of scaling_decision_entry. It receives the recommendation
        from the policy evaluator and applies the final compliance execution gate."
      - If the execution gate blocks (compliance conflict with non-critical urgency during change freeze,
        or during maintenance window), override action=blocked, strategy=blocked, cooldown_minutes=0,
        authorization_mode=compliance_blocked.
      - Pass through all other fields from the policy recommendation unchanged.
      - "All fields in the output must have computed values (never placeholder strings like 'draft_action')."
  - hint_id: record_decision
    summary: Emit one exact decision entry and update a deterministic rolling store.
    input_names: [scaling_decision_entry]
    output_names: [scaling_decision_store]
    business_rules:
      - "CRITICAL: The input port receives scaling_decision_entry (the final decision) from the
        apply_compliance_and_execution component. The input port name must match what the upstream
        component emits. NEVER create an input port named 'scaling_decision_store'."
      - Accumulate decisions in order; emit the updated rolling store.
human_context_notes:
  - This front-half-first bundle intentionally mirrors the reused runtime cases and expected outputs so the benchmark contract stays truthful.
  - Keep the component graph bounded and reviewable; do not collapse all rules into one opaque function.
  - The later empirical smoke gate should compare AC14 and a monolithic baseline from this same exact structured-spec contract.
