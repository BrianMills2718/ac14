    description: Zeta-modified d2.
  - name: disc_alpha
    type: float
    required: true
    description: Alpha-modified discount factor.
  - name: gamma
    type: float
    required: true
    description: Gamma = zeta * N'(d1_zeta) / (S * sigma * sqrt(T)).

