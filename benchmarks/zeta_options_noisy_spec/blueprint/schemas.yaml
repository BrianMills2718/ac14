  - name: d1_zeta
    type: float
    required: true
    description: Zeta-modified d1.
  - name: d2_zeta
    type: float
    required: true
    description: Zeta-modified d2.
  - name: disc_alpha
    type: float
    required: true
    description: Alpha-modified discount factor.
  - name: delta_call
    type: float
    required: true
    description: Delta of call = zeta * N(d1_zeta).
  - name: delta_put
    type: float
    required: true
    description: Delta of put = zeta * N(d1_zeta) - 1.

