global_invariants:
  - invariant_id: digest_entry_ticket_id_consistency
    description: DigestEntry.ticket_id must equal the joined upstream ticket_id.
  - invariant_id: digest_store_unique_ticket_ids
    description: DigestStore must contain at most one entry per ticket_id.

evaluators:
  - evaluator_id: exact_outputs
    kind: programmatic_exact
    description: Compare actual outputs to declared fixture outputs exactly.
  - evaluator_id: negative_failure
    kind: programmatic_failure
    description: Confirm that a negative scenario fails loudly rather than silently succeeding.
  - evaluator_id: requirements_acceptance
    kind: llm_requirements_acceptance
    description: Review outputs against scenario requirements and business logic.

scenarios:
  - scenario_id: auth_known_customer
    kind: semantic_acceptance
    description: Auth issue with a known customer still produces a digest entry and customer context.
    evaluator_ids:
      - exact_outputs
      - requirements_acceptance
    realistic_input: true
    requirements:
      - The system should recognize the issue as authentication-related rather than billing or account-management.
      - The digest should preserve the low-priority auth classification and known customer tier.
      - The action hint should stay conservative and avoid unnecessary escalation for a non-urgent auth issue.
    fixture_ids:
      - auth_known_customer_ticket_parser
      - auth_known_customer_issue_classifier
      - auth_known_customer_priority_scorer
      - auth_known_customer_customer_context_loader
      - auth_known_customer_digest_assembler
  - scenario_id: general_anonymous
    kind: full_recomposition
    description: General question with no customer context still joins cleanly.
    evaluator_ids:
      - exact_outputs
    realistic_input: false
    fixture_ids:
      - general_anonymous_ticket_parser
      - general_anonymous_issue_classifier
      - general_anonymous_priority_scorer
      - general_anonymous_customer_context_loader
      - general_anonymous_digest_assembler
  - scenario_id: schema_mismatch_rejected
    kind: negative
    description: Digest assembler must reject incompatible required inputs.
    evaluator_ids:
      - negative_failure
    realistic_input: false
    fixture_ids:
      - schema_mismatch_rejected_digest_assembler
